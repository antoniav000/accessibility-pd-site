<!DOCTYPE html>
<html>
<head>
  <title>Accessibility PD Course</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- LEFT SIDE -->
  <div class="left-panel">

    <h1>Foundations of Accessible Design</h1>
    <p>Select a module to begin.</p>

    <!-- Module 1 -->
    <div class="module">
      <button class="module-header" id="module1-header">
        Module 1: Introduction to Accessible Teaching <span class="check"></span>
      </button>
      <div class="module-content">
        <p>Learn the basics of accessibility and why it matters.</p>
        <a href="modules/module1.html">
          <button class="start-btn">Begin Module</button>
        </a>
      </div>
    </div>

    <!-- Module 2 -->
    <div class="module">
      <button class="module-header" id="module2-header">
        Module 2: Designing Accessible Content <span class="check"></span>
      </button>
      <div class="module-content">
        <p>Understand how screen readers work and how to support them.</p>
        <a href="modules/module2.html">
          <button class="start-btn">Begin Module</button>
        </a>
      </div>
    </div>

    <!-- Module 3 -->
    <div class="module">
      <button class="module-header" id="module3-header">
        Module 3: Accessible Media & Multimedia <span class="check"></span>
      </button>
      <div class="module-content">
        <p>Learn how users navigate websites without a mouse.</p>
        <a href="modules/module3.html">
          <button class="start-btn">Begin Module</button>
        </a>
      </div>
    </div>

    <!-- Module 4 -->
    <div class="module">
      <button class="module-header" id="module4-header">
        Module 4: Inclusive Teaching Practices <span class="check"></span>
      </button>
      <div class="module-content">
        <p>Understand accessible color and visual design principles.</p>
        <a href="modules/module4.html">
          <button class="start-btn">Begin Module</button>
        </a>
      </div>
    </div>


  </div>

  <!-- RIGHT SIDE -->
  <div class="right-panel">
    <div class="progress-circle" id="progress-circle">
      <div class="progress-circle-inner">
        <span id="progress-percent">0%</span>
        <span class="progress-label"></span>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
